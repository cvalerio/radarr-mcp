name: Release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - rid: win-x64
            os: windows-latest
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-latest
          - rid: osx-arm64
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish
        run: >
          dotnet publish src/RadarrMcp/RadarrMcp.csproj
          -c Release
          -r ${{ matrix.rid }}
          -p:PublishRelease=true
          -o ./publish

      - name: Zip (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath RadarrMcp-${{ matrix.rid }}.zip

      - name: Build Windows installer
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DAppVersion="$version" `
            /DSourceDir="${{ github.workspace }}\publish" `
            installer\windows.iss

      - name: Zip (Unix)
        if: matrix.os != 'windows-latest'
        run: zip -j RadarrMcp-${{ matrix.rid }}.zip ./publish/*

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: RadarrMcp-${{ matrix.rid }}
          path: RadarrMcp-${{ matrix.rid }}.zip
          if-no-files-found: error

      - name: Upload Windows installer artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: RadarrMcp-win-x64-setup
          path: installer/installer-out/RadarrMcp-win-x64-setup.exe
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.exe
